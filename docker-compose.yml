services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_kotnik
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_kotnik"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # --- NVIDIA GPU passthrough (Proxmox): uncomment if GPU is available ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    ports:
      - "127.0.0.1:11434:11434"   # only accessible locally on VM
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18        # up to 3 minutes for cold start
      start_period: 15s

  # Pulls the model on first run (or updates it); exits when done.
  # api + email-worker wait for this to complete successfully.
  ollama-init:
    image: curlimages/curl:latest
    restart: "no"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    entrypoint: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 3; done &&
        echo 'Pulling model: '$$OLLAMA_MODEL &&
        curl -sf --max-time 1800
          -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d \"{\\\"name\\\":\\\"$$OLLAMA_MODEL\\\",\\\"stream\\\":false}\" &&
        echo 'Model ready.'
      "
    depends_on:
      ollama:
        condition: service_healthy

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      FERNET_KEY: ${FERNET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP:-0.0.0.0}:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY}
      EMAIL_POLL_INTERVAL: ${EMAIL_POLL_INTERVAL:-45}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      RUN_EMAIL_WORKER: "false"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully

  email-worker:
    build: .
    command: python worker.py
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY}
      EMAIL_POLL_INTERVAL: ${EMAIL_POLL_INTERVAL:-45}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  ollama_data:
