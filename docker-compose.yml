services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_kotnik
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_kotnik"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      FERNET_KEY: ${FERNET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      # Bind only to Tailscale interface - set TAILSCALE_IP in .env
      - "${TAILSCALE_IP:-0.0.0.0}:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      FERNET_KEY: ${FERNET_KEY}
      EMAIL_POLL_INTERVAL: ${EMAIL_POLL_INTERVAL:-45}
      # Disable embedded poll loop - worker handles this separately
      RUN_EMAIL_WORKER: "false"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  email-worker:
    build: .
    command: python worker.py
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      REDIS_URL: redis://redis:6379/0
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      FERNET_KEY: ${FERNET_KEY}
      EMAIL_POLL_INTERVAL: ${EMAIL_POLL_INTERVAL:-45}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
