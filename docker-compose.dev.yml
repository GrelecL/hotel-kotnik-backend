# Standalone dev compose — brez Ollama za hitrejši lokalni test
# Uporaba: docker compose -f docker-compose.dev.yml up -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_kotnik
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_kotnik"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata_dev:/data

  migrate:
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      FERNET_KEY: ${FERNET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hotel:${DB_PASSWORD}@db:5432/hotel_kotnik
      REDIS_URL: redis://redis:6379/0
      FERNET_KEY: ${FERNET_KEY}
      OLLAMA_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:latest}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata_dev:
  redisdata_dev:
